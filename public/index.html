<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주유소 가격 정보</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { color: #1a73e8; margin-top: 0; font-size: 1.2rem; }
        p { margin: 10px 0; color: #555; }
        .price { font-size: 1.5rem; font-weight: bold; color: #d93025; }
        .date { font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <div class="card" id="info">
        <p>데이터 불러오는 중...</p>
    </div>

    <script>
        async function fetchGasData() {
            try {
                const res = await fetch('/api/get-gas');
                const data = await res.json();
                
                document.getElementById('info').innerHTML = `
                    <h2>${data.name}</h2>
                    <p>현재 경유 가격</p>
                    <p class="price">${Number(data.price).toLocaleString()}원</p>
                    <p class="date">업데이트: ${data.date}</p>
                `;
            } catch (e) {
                document.getElementById('info').innerHTML = '<p>데이터를 불러오지 못했습니다.</p>';
            }
        }
        fetchGasData();
    </script>
</body>
</html>
